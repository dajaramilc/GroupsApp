<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GroupsApp</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- ═══════════ LOGIN / REGISTER ═══════════ -->
    <div id="auth-screen" class="auth-screen">
        <div class="auth-container">
            <div class="auth-logo">
                <div class="logo-icon">G</div>
                <h1>GroupsApp</h1>
                <p class="auth-subtitle">Mensajería de grupos</p>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <input type="text" id="login-username" placeholder="Usuario" required autocomplete="username">
                </div>
                <div class="form-group">
                    <input type="password" id="login-password" placeholder="Contraseña" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary">Iniciar Sesión</button>
                <p class="auth-switch">¿No tienes cuenta? <a href="#" id="show-register">Regístrate</a></p>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <input type="text" id="reg-username" placeholder="Usuario" required minlength="3">
                </div>
                <div class="form-group">
                    <input type="email" id="reg-email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="text" id="reg-displayname" placeholder="Nombre para mostrar" required>
                </div>
                <div class="form-group">
                    <input type="password" id="reg-password" placeholder="Contraseña (mín. 6 caracteres)" required minlength="6">
                </div>
                <button type="submit" class="btn-primary">Registrarse</button>
                <p class="auth-switch">¿Ya tienes cuenta? <a href="#" id="show-login">Inicia sesión</a></p>
            </form>

            <div id="auth-error" class="error-msg hidden"></div>
        </div>
    </div>

    <!-- ═══════════ MAIN APP ═══════════ -->
    <div id="app-screen" class="app-screen hidden">
        <!-- ── Left Sidebar ── -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="user-info">
                    <div class="avatar" id="user-avatar">A</div>
                    <span id="user-display-name">Usuario</span>
                </div>
                <div class="sidebar-actions">
                    <button class="icon-btn" id="btn-new-group" title="Nuevo grupo">＋</button>
                    <button class="icon-btn" id="btn-logout" title="Cerrar sesión">⏻</button>
                </div>
            </div>

            <!-- Tab Navigation -->
            <div class="sidebar-tabs">
                <button class="tab active" data-tab="groups">Grupos</button>
                <button class="tab" data-tab="dms">Directos</button>
            </div>

            <!-- Groups List -->
            <div id="tab-groups" class="tab-content active">
                <div id="groups-list" class="chat-list"></div>
            </div>

            <!-- DM List -->
            <div id="tab-dms" class="tab-content">
                <div class="dm-search-bar">
                    <input type="text" id="dm-search-input" placeholder="Buscar usuario...">
                    <button class="icon-btn" id="btn-dm-search">🔍</button>
                </div>
                <div id="dm-search-results" class="chat-list"></div>
                <!-- Recent conversations (chat history) -->
                <div id="dm-conversations" class="chat-list"></div>
                <div id="dm-list" class="chat-list"></div>
            </div>
        </aside>

        <!-- ── Center Panel: Channels / Chat ── -->
        <div id="center-panel" class="center-panel">
            <!-- Sub-panel: Channel list for a group -->
            <div id="channel-panel" class="channel-panel hidden">
                <div class="channel-header">
                    <button class="icon-btn text-btn" id="btn-back-groups" title="Cerrar el grupo actual">✕ Cerrar Grupo</button>
                    <h3 id="channel-group-name">Grupo</h3>
                    <div class="channel-actions">
                        <button class="icon-btn" id="btn-add-member" title="Agregar miembro">👤＋</button>
                        <button class="icon-btn" id="btn-new-channel" title="Nuevo canal">＃＋</button>
                        <button class="icon-btn" id="btn-view-members" title="Ver miembros">👥</button>
                        <button class="icon-btn btn-danger hidden" id="btn-delete-group" title="Eliminar grupo">🗑️</button>
                    </div>
                </div>
                <div id="channels-list" class="chat-list"></div>
            </div>

            <!-- Chat area -->
            <div id="chat-area" class="chat-area">
                <div class="chat-header" id="chat-header">
                    <button class="icon-btn text-btn" id="btn-back-channels" title="Volver a la sección de canales" style="display: none;">← Salir</button>
                    <div class="chat-header-info">
                        <h3 id="chat-name">Selecciona un chat</h3>
                        <span id="chat-status" class="chat-status"></span>
                    </div>
                </div>

                <!-- Welcome / Empty state -->
                <div id="chat-welcome" class="chat-welcome">
                    <div class="welcome-icon">💬</div>
                    <h2>Bienvenido a GroupsApp</h2>
                    <p>Selecciona un grupo o inicia una conversación</p>
                </div>

                <!-- Messages -->
                <div id="messages-container" class="messages-container hidden">
                    <div id="messages-list" class="messages-list"></div>
                </div>

                <!-- Message Input -->
                <div id="message-input-bar" class="message-input-bar hidden">
                    <label class="icon-btn attach-btn" title="Adjuntar archivo">
                        📎
                        <input type="file" id="file-input" hidden>
                    </label>
                    <input type="text" id="message-input" placeholder="Escribe un mensaje..." autocomplete="off">
                    <button class="icon-btn mic-btn" id="btn-mic" title="Grabar audio">🎤</button>
                    <button class="send-btn" id="btn-send">➤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══════════ MODALS ═══════════ -->

    <!-- Create Group Modal -->
    <div id="modal-create-group" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Nuevo Grupo</h3>
                <button class="modal-close" data-close="modal-create-group">✕</button>
            </div>
            <form id="form-create-group">
                <div class="form-group">
                    <input type="text" id="group-name" placeholder="Nombre del grupo" required>
                </div>
                <div class="form-group">
                    <input type="text" id="group-desc" placeholder="Descripción (opcional)">
                </div>
                <button type="submit" class="btn-primary">Crear Grupo</button>
            </form>
        </div>
    </div>

    <!-- Create Channel Modal -->
    <div id="modal-create-channel" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Nuevo Canal</h3>
                <button class="modal-close" data-close="modal-create-channel">✕</button>
            </div>
            <form id="form-create-channel">
                <div class="form-group">
                    <input type="text" id="channel-name" placeholder="Nombre del canal" required>
                </div>
                <div class="form-group">
                    <input type="text" id="channel-desc" placeholder="Descripción (opcional)">
                </div>
                <button type="submit" class="btn-primary">Crear Canal</button>
            </form>
        </div>
    </div>

    <!-- Add Member Modal -->
    <div id="modal-add-member" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Agregar Miembro</h3>
                <button class="modal-close" data-close="modal-add-member">✕</button>
            </div>
            <form id="form-add-member">
                <div class="form-group">
                    <input type="text" id="member-search" placeholder="Buscar usuario...">
                </div>
                <div id="member-search-results" class="search-results"></div>
            </form>
        </div>
    </div>

    <!-- Members List Modal -->
    <div id="modal-members" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Miembros del Grupo</h3>
                <button class="modal-close" data-close="modal-members">✕</button>
            </div>
            <div id="members-list" class="members-list"></div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <!-- Recording indicator -->
    <div id="recording-indicator" class="recording-indicator hidden">
        <div class="recording-dot"></div>
        <span>Grabando...</span>
        <button class="icon-btn" id="btn-cancel-record" title="Cancelar">✕</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
